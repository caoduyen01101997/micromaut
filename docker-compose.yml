version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: micromaut-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: ghcr.io/caoduyen01101997/micromaut:latest
    container_name: micromaut-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: pass123
    depends_on:
      - db

volumes:
  postgres_data:

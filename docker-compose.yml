version: '3.8'

services:
  app:
    image: ghcr.io/caoduyen01101997/micromaut:latest
    container_name: micromaut-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://my_postgres:5432/mydatabase
      DB_USERNAME: myuser
      DB_PASSWORD: pass123
    networks:
      - default
      - host_bridge

networks:
  host_bridge:
    external: true
    name: bridge

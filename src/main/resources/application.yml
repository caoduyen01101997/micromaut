
micronaut:
  application:
    name: micromaut
  scheduling:
    enabled: true
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        default:
          allowedOrigins:
            - http://localhost:4200
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
          allowedHeaders:
            - '*'
          exposedHeaders:
            - '*'
          allowCredentials: true
  security:
    authentication: bearer
    endpoints:
      login:
        enabled: true
        path: /login
        post:
          enabled: true
    intercept-url-map:
      - pattern: /login
        http-method: POST
        access: isAnonymous()
      - pattern: /account/**
        access: isAnonymous()
      - pattern: /pump/**
        access: isAnonymous()
      - pattern: /**
        access: isAuthenticated()
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: "${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}"
netty:
  default:
    allocator:
      max-order: 3
mongodb:
    uri: mongodb://localhost:27017/coffee
datasources:
  default:
    url: jdbc:postgresql://157.10.53.34:5432/mydatabase?sslmode=disable&amp;loginTimeout=120&amp;socketTimeout=120
    maximumPoolSize: 10
    connectionTimeout: 120000
    initializationFailTimeout: 0
    driverClassName: org.postgresql.Driver
    username: myuser
    password: pass123
    hikari:
      connection-timeout: 3000       # max chờ lấy connection (ms)
      validation-timeout: 1000
      initialization-fail-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000           # 10 phút
      max-lifetime: 1800000          # 30 phút
      connection-test-query: SELECT 1
      pool-name: HikariPool
    validationTimeout: 10000       # 10s
    minimumIdle: 2
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
jpa:
  default:
    entity-scan:
      packages: 'com.example'
    properties:
        hibernate:
          hbm2ddl:
            auto: none
          show_sql: true
          format_sql: true
          dialect: org.hibernate.dialect.PostgreSQLDialect
firebase:
  service-account-base64: ""
logger:
  levels:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    io.micronaut.security: DEBUG
    com.example.provider.CustomAuthenticationProvider: DEBUG
    io.micronaut.web.router: TRACE
    io.micronaut.security.filters: TRACE
    io.micronaut.security.token: TRACE
    io.micronaut.scheduling: DEBUG

